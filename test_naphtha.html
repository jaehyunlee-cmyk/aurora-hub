<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Naphtha API Test</title></head>
<body>
<h2>Naphtha Data Source Test</h2>
<div id="results"></div>
<script>
const log = msg => { document.getElementById('results').innerHTML += '<p>' + msg + '</p>'; };

async function testAll() {

  // Test 1: TradingEconomics embed/widget (무료)
  try {
    const r = await fetch('https://api.tradingeconomics.com/markets/commodity/naphtha?c=guest:guest');
    log('TE API status: ' + r.status + ' / ' + r.statusText);
    const t = await r.text();
    log('TE API response: ' + t.slice(0,200));
  } catch(e) { log('❌ TE API: ' + e.message); }

  // Test 2: Yahoo Finance naphtha search
  try {
    const r = await fetch('https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/NAF%3DF?interval=1d&range=5d', {headers:{'x-requested-with':'XMLHttpRequest'}});
    const j = await r.json();
    log('Yahoo NAF=F: ' + JSON.stringify(j?.chart?.result?.[0]?.meta).slice(0,150));
  } catch(e) { log('❌ Yahoo NAF=F: ' + e.message); }

  // Test 3: Yahoo Finance naphtha alternative tickers
  const tickers = ['NAPHTHA', '0NAP.L', 'NAPHTHACRG'];
  for (const t of tickers) {
    try {
      const r = await fetch('https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(t) + '?interval=1d&range=5d', {headers:{'x-requested-with':'XMLHttpRequest'}});
      const j = await r.json();
      const meta = j?.chart?.result?.[0]?.meta;
      if (meta) log('✅ Yahoo ' + t + ': ' + JSON.stringify(meta).slice(0,150));
      else log('❌ Yahoo ' + t + ': no result');
    } catch(e) { log('❌ Yahoo ' + t + ': ' + e.message); }
  }

  // Test 4: stooq naphtha
  try {
    const r = await fetch('https://corsproxy.io/?https://stooq.com/q/d/l/?s=naphtha&i=d', {headers:{'x-requested-with':'XMLHttpRequest'}});
    const t = await r.text();
    log('Stooq naphtha: ' + t.slice(0,200));
  } catch(e) { log('❌ Stooq: ' + e.message); }
}
testAll();
</script>
</body>
</html>
